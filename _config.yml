# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: aksh.ai | Digital Transformation, Data-Science and Design
email: mail@aksh.ai
description: >- # this means to ignore newlines until "baseurl:"
  Digital Transformation through data-science and design. Published in two languages. దత్తాంశ శాస్త్రంతో వ్యూహరచన. ద్విభాషా ప్రచురణ.
baseurl: "" # the subpath of your site, e.g. /blog
url: "http://www.aksh.ai" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: aksh_ai
github_username:  metamutator

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
